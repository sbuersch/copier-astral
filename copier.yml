# Copier configuration for Python projects with Astral toolchain
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template
_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:SlugifyExtension
  - extensions.py:GitExtension
  - extensions.py:CurrentYearExtension

_skip_if_exists:
  - CHANGELOG.md

# =============================================================================
# Project Basics
# =============================================================================

# Questions for the user
project_name:
  type: str
  help: What is your Django project name?
  default: my-django-project

project_slug:
  type: str
  help: Python package name (lowercase, underscores)
  default: "{{ project_name|lower|replace('-', '_')|replace(' ', '_') }}"

description:
  type: str
  help: Project description
  default: A Django project


python_version:
  type: str
  help: Python version
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
  default: "3.12"

django_version:
  type: str
  help: Django version
  choices:
    - "5.1"
    - "5.0"
    - "4.2"
  default: "5.1"

use_postgres:
  type: bool
  help: Use PostgreSQL instead of SQLite?
  default: yes

use_docker:
  type: bool
  help: Include Docker configuration?
  default: yes

use_celery:
  type: bool
  help: Include Celery for async tasks?
  default: no

use_redis:
  type: bool
  help: Include Redis for caching?
  default: "{{ use_celery }}"

use_allauth:
  type: bool
  help: Include django-allauth for authentication?
  default: yes

use_rest_framework:
  type: bool
  help: Include Django REST Framework?
  default: yes

use_debug_toolbar:
  type: bool
  help: Include Django Debug Toolbar?
  default: yes

_tasks:
  - "cd {{ project_slug }} && echo '📍 Project root:' && pwd"
  - "cd {{ project_slug }} && echo '📦 Running uv sync...' && uv sync"
  - "cd {{ project_slug }} && ([ -f .env.example ] && cp .env.example .env || echo '⚠️  No .env.example')"

  # Start PostgreSQL with Docker
  - "cd {{ project_slug }} && echo '🐘 Starting PostgreSQL with Docker...' && docker-compose up -d db"
  - "cd {{ project_slug }} && echo '⏳ Waiting for PostgreSQL to be ready...' && sleep 5"
  - "cd {{ project_slug }} && docker-compose exec -T db pg_isready -U postgres || (echo '❌ PostgreSQL not ready' && exit 1)"

  # Run migrations
  - "cd {{ project_slug }} && echo '🚀 Running migrations...' && uv run python manage.py migrate"
  - "cd {{ project_slug }} && echo '👤 Creating superuser...' && uv run python manage.py createsuperuser --noinput --username admin --email admin@example.com || true"

  - "echo '✅ Django project {{ project_name }} created! Run: cd {{ project_slug }} && docker-compose up -d db && uv run python manage.py runserver'"
  -
_exclude:
  - "copier.yml"
  - "*.pyc"
  - "__pycache__"
  - ".git"

# =============================================================================
# Author Information
# =============================================================================

author_name:
  type: str
  help: "Author's full name"
  default: "{{ 'git config user.name' | git_config }}"
  placeholder: "John Doe"

author_email:
  type: str
  help: "Author's email address"
  default: "{{ 'git config user.email' | git_config }}"
  placeholder: "john@example.com"

github_username:
  type: str
  help: "GitHub username or organization (used for repository URLs)"
  default: "{{ '' | github_username }}"
  placeholder: "johndoe"
  validator: >-
    {% if github_username and not github_username | regex_search('^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$') %}
    Invalid GitHub username format.
    {% endif %}

# =============================================================================
# Repository
# =============================================================================

repository_name:
  type: str
  help: "Repository name on GitHub"
  default: "{{ project_name | slugify }}"

# =============================================================================
# Python Version
# =============================================================================

python_versions_matrix:
  type: str
  help: "Python versions for CI matrix testing (comma-separated)"
  default: "3.10,3.11,3.12,3.13"

# =============================================================================
# Features
# =============================================================================

include_cli:
  type: bool
  help: "Include CLI with Typer?"
  default: true

include_github_actions:
  type: bool
  help: "Include GitHub Actions CI/CD?"
  default: true

include_docker:
  type: bool
  help: "Include Dockerfile for containerization?"
  default: true

include_docs:
  type: bool
  help: "Include MkDocs documentation?"
  default: true

include_prek:
  type: bool
  help: "Include prek (pre-commit) hooks for code quality checks?"
  default: true

include_codecov:
  type: bool
  help: "Include Codecov integration?"
  default: true
  when: "{{ include_github_actions }}"

include_security_scanning:
  type: bool
  help: "Include security scanning (Gitleaks, pysentry, Semgrep)?"
  default: true
  when: "{{ include_github_actions }}"

include_pypi_publish:
  type: bool
  help: "Include automatic PyPI publishing?"
  default: true
  when: "{{ include_github_actions }}"

# =============================================================================
# License
# =============================================================================

license:
  type: str
  help: "Project license"
  choices:
    - MIT
    - Apache-2.0
    - GPL-3.0
    - BSD-3-Clause
    - ISC
    - Proprietary
  default: MIT

# =============================================================================
# Computed/Internal Variables
# =============================================================================

